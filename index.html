<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Trading System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top,#0f2027,#000);
  color:#fff;
}
.card{
  width:92%;
  max-width:420px;
  padding:36px;
  border-radius:24px;
  background:rgba(255,255,255,.06);
  box-shadow:0 0 50px rgba(0,255,200,.4);
  text-align:center;
}
.logo{
  width:90px;height:90px;
  border-radius:50%;
  background:linear-gradient(135deg,#00ffd5,#00aaff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:800;
  color:#000;
  margin:0 auto 18px;
  box-shadow:0 0 30px rgba(0,255,213,.8);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.07)}
  100%{transform:scale(1)}
}
h1{font-size:22px;margin:10px 0}
p{font-size:14px;opacity:.85}
.stats{
  display:flex;
  justify-content:space-between;
  margin:20px 0;
}
.stat{
  flex:1;
  margin:0 5px;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  font-size:12px;
}
.stat b{
  display:block;
  font-size:18px;
  color:#00ffd5;
}
.btn{
  display:inline-block;
  margin-top:22px;
  padding:14px 30px;
  border-radius:40px;
  background:linear-gradient(135deg,#ffcc00,#ff8800);
  color:#000;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 0 25px rgba(255,180,0,.6);
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">AI</div>
  <h1>AI NON MTG BOT</h1>
  <p style="color:#00ffd5;font-weight:600;">
🔐 Private AI Access • Limited Entry
</p>
  <p>Connecting to AI Trading System...</p>

  <div class="stats">
    <div class="stat"><b>8,921</b>Users</div>
    <div class="stat"><b>95%</b>Accuracy</div>
    <div class="stat"><b>24/7</b>Bot</div>
  </div>

  <a class="btn" href="https://t.me/+I-hHTgGouqMzMzQ8" target="_blank">
    Open Auto Trading Bot
  </a>
</div>

<script>
setTimeout(function(){
  window.location.href="https://t.me/BuildWith_Mask_AiBot?start=start";
},1800);
</script>

</body>
</html>
